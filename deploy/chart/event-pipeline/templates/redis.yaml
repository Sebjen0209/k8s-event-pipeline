apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  labels:
    app.kubernetes.io/name: redis
    {{- include "event-pipeline.labels" . | nindent 4 }}
spec:
  replicas: 1
  # Recreate: two Redis pods must never share the stream during a rollout.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: redis
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redis
        {{- include "event-pipeline.labels" . | nindent 8 }}
    spec:
      securityContext:
        {{- include "event-pipeline.podSecurityContext" . | nindent 8 }}
      containers:
        - name: redis
          image: {{ .Values.redis.image | quote }}
          # uid 999 = the redis user in the official image.
          securityContext:
            runAsUser: 999
            runAsGroup: 999
            {{- include "event-pipeline.containerSecurityContext" . | nindent 12 }}
          args: ["redis-server", "--appendonly", "no", "--save", ""]
          ports:
            - name: redis
              containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          livenessProbe:
            tcpSocket: { port: redis }
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.redis.resources | nindent 12 }}
      volumes:
        # Demo-grade: state is disposable by design (see README). Production
        # would use managed Redis or a StatefulSet with PVCs + AOF.
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  labels:
    app.kubernetes.io/name: redis
    {{- include "event-pipeline.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: redis
  ports:
    - name: redis
      port: 6379
      targetPort: redis
