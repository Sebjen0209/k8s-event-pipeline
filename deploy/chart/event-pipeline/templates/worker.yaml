apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  labels:
    app.kubernetes.io/name: worker
    {{- include "event-pipeline.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: worker
        {{- include "event-pipeline.labels" . | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: /metrics
    spec:
      securityContext:
        {{- include "event-pipeline.podSecurityContext" . | nindent 8 }}
      containers:
        - name: worker
          image: "{{ .Values.image.repository }}/worker:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- include "event-pipeline.containerSecurityContext" . | nindent 12 }}
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: REDIS_ADDR
              value: redis:6379
            - name: STREAM_NAME
              value: {{ .Values.stream.name | quote }}
            - name: CONSUMER_GROUP
              value: {{ .Values.stream.consumerGroup | quote }}
            # Pod name as consumer name makes XPENDING output point at the
            # exact pod that read a message and died with it unacked.
            - name: CONSUMER_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          livenessProbe:
            httpGet: { path: /healthz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 10
          readinessProbe:
            httpGet: { path: /readyz, port: http }
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            {{- toYaml .Values.worker.resources | nindent 12 }}
