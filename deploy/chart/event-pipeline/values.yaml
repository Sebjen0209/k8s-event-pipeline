# Image repository prefix — the chart appends /ingest-api and /worker.
image:
  repository: ghcr.io/sebjen0209/k8s-event-pipeline
  tag: latest
  pullPolicy: IfNotPresent

stream:
  name: events
  # XADD trims the stream to roughly this many entries so a stalled consumer
  # can never grow Redis without bound.
  maxLen: "100000"
  consumerGroup: aggregators

ingestApi:
  # Ignored while the HPA owns the replica count.
  replicas: 2
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 250m, memory: 128Mi }
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 5
    targetCPUUtilizationPercentage: 70
  pdb:
    enabled: true
    minAvailable: 1

worker:
  # Multiple replicas are safe: they share one consumer group and the
  # aggregate updates are atomic increments.
  replicas: 1
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 250m, memory: 128Mi }

redis:
  # Demo-grade single instance on emptyDir. See "What I would change for
  # production" in the README.
  image: redis:7-alpine
  resources:
    requests: { cpu: 50m, memory: 64Mi }
    limits: { cpu: 200m, memory: 256Mi }

networkPolicy:
  # Only ingest-api and worker may reach Redis. Enforcement requires a CNI
  # that implements NetworkPolicy (Calico/Cilium — kind's default CNI ignores it).
  enabled: true

metrics:
  serviceMonitor:
    # Requires the Prometheus Operator CRDs in the cluster.
    enabled: false
  prometheusRule:
    # Ships the alert rules from rules/alerts.yaml as a PrometheusRule.
    # Requires the Prometheus Operator CRDs in the cluster.
    enabled: false

tracing:
  # OTLP/HTTP endpoint for traces (e.g. http://otel-collector:4318).
  # Empty = tracing off; trace context still propagates through the stream.
  otlpEndpoint: ""
